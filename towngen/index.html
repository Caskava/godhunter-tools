<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>God Hunter — Settlement Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0c0b0a;--surface:#111009;--surface2:#181510;--border:#2a2518;--border2:#3a3020;--gold:#c9a84c;--gold-dim:rgba(201,168,76,0.10);--gold-glow:rgba(201,168,76,0.28);--text:#f0ead8;--text2:#a89e8a;--text3:#6b6050;--red:#8b2020;--r:6px}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'Crimson Pro',Georgia,serif;-webkit-font-smoothing:antialiased}
.ambient{position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(201,168,76,0.055) 0%,transparent 70%)}
.wrap{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:48px 20px 80px}
.header{text-align:center;margin-bottom:40px}
.header-eyebrow{font-family:'Cinzel',serif;font-size:10px;letter-spacing:0.35em;color:var(--text3);text-transform:uppercase;margin-bottom:14px}
.header-title{font-family:'Cinzel',serif;font-size:clamp(32px,5.5vw,60px);font-weight:900;color:var(--text);letter-spacing:0.05em;line-height:1}
.header-title span{color:var(--gold)}
.header-sub{font-size:15px;color:var(--text3);margin-top:10px;font-style:italic}
.rule{display:flex;align-items:center;gap:12px;margin-top:20px;justify-content:center}
.rule hr{border:none;border-top:1px solid var(--border2);width:60px}
.gem{width:6px;height:6px;background:var(--gold);transform:rotate(45deg);box-shadow:0 0 8px var(--gold-glow)}
.countries{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;width:100%;max-width:740px;margin-bottom:20px}
@media(max-width:560px){.countries{grid-template-columns:repeat(2,1fr)}}
.country-btn{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:13px 8px;cursor:pointer;transition:all 0.2s;text-align:center;font-family:'Cinzel',serif;font-size:10px;letter-spacing:0.1em;color:var(--text3);text-transform:uppercase;position:relative;overflow:hidden}
.country-btn:hover{border-color:var(--border2);color:var(--text2);background:var(--surface2)}
.country-btn.active{border-color:var(--gold);color:var(--gold);background:var(--gold-dim)}
.country-btn.active::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:18px;height:2px;background:var(--gold);box-shadow:0 0 8px var(--gold-glow)}
.country-name{display:block;margin-bottom:2px}
.country-desc{font-family:'Crimson Pro',serif;font-size:9px;color:var(--text3);font-style:italic;text-transform:none;font-weight:300}
.country-preview{font-size:8px;color:var(--text3);margin-top:4px;font-family:'Cinzel',serif;letter-spacing:0.05em;opacity:0.7;font-style:italic;text-transform:none}
.options{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:20px;max-width:740px;width:100%}
.pill{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:5px 14px;font-family:'Crimson Pro',serif;font-size:13px;color:var(--text3);cursor:pointer;transition:all 0.15s}
.pill:hover{border-color:var(--border2);color:var(--text2)}
.pill.active{border-color:var(--gold);color:var(--gold);background:var(--gold-dim)}
.invoke-btn{font-family:'Cinzel',serif;font-size:12px;letter-spacing:0.22em;text-transform:uppercase;background:transparent;border:1px solid var(--gold);color:var(--gold);padding:13px 52px;cursor:pointer;transition:all 0.25s;margin-bottom:36px}
.invoke-btn:hover{background:var(--gold-dim);box-shadow:0 0 24px var(--gold-glow);letter-spacing:0.27em}
.invoke-btn:active{transform:scale(0.97)}
.result-area{width:100%;max-width:740px;min-height:140px;display:flex;flex-direction:column;align-items:center;justify-content:center;margin-bottom:36px;text-align:center}
.result-name{font-family:'Cinzel',serif;font-size:clamp(24px,4.5vw,48px);font-weight:700;color:var(--text);letter-spacing:0.06em;animation:nameReveal 0.45s cubic-bezier(0.22,1,0.36,1) both;text-shadow:0 0 40px rgba(201,168,76,0.18);line-height:1.2;margin-bottom:8px}
.result-type{font-family:'Cinzel',serif;font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:var(--gold);margin-bottom:8px}
.result-country{font-size:11px;color:var(--text3);letter-spacing:0.18em;text-transform:uppercase;font-family:'Cinzel',serif;margin-bottom:8px}
.result-desc{font-size:14px;color:var(--text2);font-style:italic;max-width:500px;line-height:1.6;margin-bottom:12px}
.result-empty{font-size:15px;color:var(--text3);font-style:italic}
.result-actions{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
@keyframes nameReveal{from{opacity:0;transform:translateY(10px) scale(0.97);filter:blur(3px)}to{opacity:1;transform:none;filter:none}}
.btn{font-family:'Cinzel',serif;font-size:10px;letter-spacing:0.18em;text-transform:uppercase;background:transparent;border:1px solid var(--border2);color:var(--text3);padding:7px 18px;cursor:pointer;transition:all 0.15s;border-radius:4px}
.btn:hover{border-color:var(--gold);color:var(--gold);background:var(--gold-dim)}
.btn.primary{border-color:var(--gold);color:var(--gold)}
.list-section{width:100%;max-width:740px}
.list-head{display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border);padding-top:22px;margin-bottom:14px}
.list-title{font-family:'Cinzel',serif;font-size:10px;letter-spacing:0.22em;text-transform:uppercase;color:var(--text3)}
.list-items{display:flex;flex-direction:column;gap:4px}
.list-item{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);transition:all 0.15s}
.list-item:hover{border-color:var(--border2);background:var(--surface2)}
.list-item-name{font-family:'Cinzel',serif;font-size:13px;color:var(--text2);letter-spacing:0.04em;margin-bottom:2px}
.list-item-type{font-size:10px;color:var(--gold);font-family:'Cinzel',serif;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:2px}
.list-item-desc{font-size:11px;color:var(--text3);font-style:italic;line-height:1.4}
.list-item-actions{display:flex;gap:4px;flex-shrink:0;margin-top:2px}
.h-btn{color:var(--text3);cursor:pointer;font-size:11px;background:none;border:1px solid var(--border);border-radius:4px;padding:2px 7px;font-family:'Crimson Pro',serif;transition:all 0.15s;white-space:nowrap}
.h-btn:hover{border-color:var(--gold);color:var(--gold)}
.h-btn.del:hover{border-color:#c96a6a;color:#c96a6a}
.list-empty{font-size:13px;color:var(--text3);font-style:italic;text-align:center;padding:18px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--surface2);border:1px solid var(--gold);color:var(--gold);font-family:'Cinzel',serif;font-size:10px;letter-spacing:0.18em;padding:10px 22px;border-radius:var(--r);transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1),opacity 0.3s;opacity:0;z-index:1000;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
</style>
</head>
<body>
<div class="ambient"></div>
<div class="wrap">

  <div class="header">
    <div class="header-eyebrow">Caelit Cartography</div>
    <h1 class="header-title">God <span>Hunter</span></h1>
    <p class="header-sub">Settlement Generator</p>
    <div class="rule"><hr/><div class="gem"></div><hr/></div>
  </div>

  <div class="countries" id="countries"></div>

  <div class="options" id="options">
    <button class="pill active" data-opt="any">Any Type</button>
    <button class="pill" data-opt="urban">Urban</button>
    <button class="pill" data-opt="rural">Rural</button>
    <button class="pill" data-opt="military">Military</button>
    <button class="pill" data-opt="batch">Batch ×8</button>
  </div>

  <!-- Jin-gardi tier selector -->
  <div id="jgTier" style="display:none;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:16px;max-width:740px;width:100%">
    <span style="font-family:'Cinzel',serif;font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:var(--text3);align-self:center">Jin-gardi tier:</span>
    <button class="pill active" data-tier="any">Any</button>
    <button class="pill" data-tier="noble">Noble</button>
    <button class="pill" data-tier="common">Common</button>
  </div>

  <button class="invoke-btn" id="genBtn">INVOKE</button>

  <div class="result-area" id="resultArea">
    <div class="result-empty">Choose a country and invoke a settlement.</div>
  </div>

  <div class="list-section">
    <div class="list-head">
      <span class="list-title">Saved Settlements</span>
      <button class="btn" id="clearBtn" style="font-size:10px;padding:4px 12px">Clear</button>
    </div>
    <div class="list-items" id="historyList"></div>
  </div>

</div>
<div class="toast" id="toast"></div>
<script src="towndata.js"></script>
<script>

// ── TYPE FILTERS ──────────────────────────────────────────────────────────

const TYPE_FILTERS = {
  any:      null,
  urban:    ['Capital City','Port Town','Market Town','Trade Hub'],
  rural:    ['Fishing Village','Rural Village','Mining Settlement'],
  military: ['Military Fort','Border Outpost'],
};

// ── GENERATION ────────────────────────────────────────────────────────────

const pick = arr => arr[Math.floor(Math.random() * arr.length)];
const maybe = p => Math.random() < p;
const cap = s => s.charAt(0).toUpperCase() + s.slice(1).toLowerCase();

function pickType(filter) {
  let pool = SETTLEMENT_TYPES;
  if (filter && TYPE_FILTERS[filter]) {
    pool = SETTLEMENT_TYPES.filter(t => TYPE_FILTERS[filter].includes(t.type));
  }
  if (!pool.length) pool = SETTLEMENT_TYPES;
  return wpickSettlement(pool).type;
}

function buildName(countryKey, jgTier) {
  const c = COUNTRIES[countryKey];

  if (countryKey === 'JinGardi') {
    // Decide tier
    let tier = jgTier;
    if (tier === 'any') tier = maybe(0.4) ? 'noble' : 'common';

    if (tier === 'noble') {
      const pre = pick(c.noblePrefixes);
      const mid = maybe(0.5) ? pick(c.nobleMiddles) : '';
      const suf = pick(c.nobleSuffixes);
      return cap(pre + mid + suf);
    } else {
      const pre = pick(c.commonPrefixes);
      const suf = pick(c.commonSuffixes);
      return pre + suf;
    }
  }

  // All other countries
  const pre = pick(c.prefixes);
  const mid = maybe(0.45) ? pick(c.middles) : '';
  const suf = pick(c.suffixes);
  return cap(pre + mid + suf);
}

function buildDescriptor(type) {
  const traits = DESCRIPTOR_TRAITS[type];
  if (!traits) return '';
  // Pick 2 traits and combine
  const shuffled = [...traits].sort(() => Math.random() - 0.5);
  return shuffled.slice(0, 2).join(', ');
}

function generate(countryKey, filter, jgTier) {
  const name = buildName(countryKey, jgTier);
  const type = pickType(filter);
  const desc = buildDescriptor(type);
  const countryLabel = COUNTRIES[countryKey].label;
  return { name, type, desc, country: countryLabel, countryKey };
}

// ── STATE ─────────────────────────────────────────────────────────────────

let activeCountry = 'Torrelis';
let activeFilter = 'any';
let activeJgTier = 'any';
let history = JSON.parse(localStorage.getItem('gh_towngen') || '[]');
let batchMode = false;

function saveHistory() { localStorage.setItem('gh_towngen', JSON.stringify(history)); }

function addToHistory(item) {
  if (history.find(h => h.name === item.name)) return;
  history.push({ ...item, ts: Date.now() });
  if (history.length > 60) history.shift();
  saveHistory(); renderHistory();
}

function showToast(msg) {
  const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 2400);
}

// ── RENDER ────────────────────────────────────────────────────────────────

function showResult(item) {
  document.getElementById('resultArea').innerHTML = `
    <div class="result-name">${item.name}</div>
    <div class="result-type">${item.type}</div>
    <div class="result-country">${item.country}</div>
    <div class="result-desc">${item.desc}</div>
    <div class="result-actions">
      <button class="btn primary" id="rCopy">Copy Name</button>
      <button class="btn" id="rSave">Save</button>
    </div>`;
  document.getElementById('rCopy').addEventListener('click', () => {
    navigator.clipboard.writeText(item.name); showToast('Copied — ' + item.name);
  });
  document.getElementById('rSave').addEventListener('click', () => {
    addToHistory(item); showToast('Saved — ' + item.name);
  });
}

function showBatch(items) {
  document.getElementById('resultArea').innerHTML = `
    <div style="width:100%;display:flex;flex-direction:column;gap:4px">
      ${items.map((item, i) => `
        <div class="list-item" style="animation:nameReveal 0.3s ${i*0.04}s both">
          <div style="flex:1">
            <div class="list-item-name">${item.name}</div>
            <div class="list-item-type">${item.type}</div>
            <div class="list-item-desc">${item.desc}</div>
          </div>
          <div class="list-item-actions">
            <button class="h-btn" data-copy="${item.name}">Copy</button>
            <button class="h-btn" data-saveidx="${i}">Save</button>
          </div>
        </div>`).join('')}
    </div>`;
  document.querySelectorAll('[data-copy]').forEach(b => b.addEventListener('click', () => {
    navigator.clipboard.writeText(b.dataset.copy); showToast('Copied — ' + b.dataset.copy);
  }));
  document.querySelectorAll('[data-saveidx]').forEach(b => b.addEventListener('click', () => {
    addToHistory(items[parseInt(b.dataset.saveidx)]);
    showToast('Saved — ' + items[parseInt(b.dataset.saveidx)].name);
  }));
}

function renderHistory() {
  const el = document.getElementById('historyList');
  if (!history.length) { el.innerHTML = '<div class="list-empty">No settlements saved yet.</div>'; return; }
  el.innerHTML = history.slice().reverse().map((item, i) => {
    const ri = history.length - 1 - i;
    return `<div class="list-item">
      <div style="flex:1">
        <div class="list-item-name">${item.name}</div>
        <div class="list-item-type">${item.type} · ${item.country}</div>
        <div class="list-item-desc">${item.desc}</div>
      </div>
      <div class="list-item-actions">
        <button class="h-btn" data-copy="${item.name}">Copy</button>
        <button class="h-btn del" data-del="${ri}">✕</button>
      </div>
    </div>`;
  }).join('');
  el.querySelectorAll('[data-copy]').forEach(b => b.addEventListener('click', () => {
    navigator.clipboard.writeText(b.dataset.copy); showToast('Copied — ' + b.dataset.copy);
  }));
  el.querySelectorAll('[data-del]').forEach(b => b.addEventListener('click', () => {
    history.splice(parseInt(b.dataset.del), 1); saveHistory(); renderHistory();
  }));
}

function renderCountries() {
  const el = document.getElementById('countries');
  el.innerHTML = Object.entries(COUNTRIES).map(([key, d]) => `
    <button class="country-btn${key === activeCountry ? ' active' : ''}" data-key="${key}">
      <span class="country-name">${d.label}</span>
      <span class="country-desc">${d.desc}</span>
      <span class="country-preview">${d.preview.join(' · ')}</span>
    </button>`).join('');
  el.querySelectorAll('.country-btn').forEach(b => b.addEventListener('click', () => {
    activeCountry = b.dataset.key;
    renderCountries();
    document.getElementById('jgTier').style.display = activeCountry === 'JinGardi' ? 'flex' : 'none';
  }));
}

// ── OPTIONS ───────────────────────────────────────────────────────────────

document.getElementById('options').querySelectorAll('.pill').forEach(btn => {
  const key = btn.dataset.opt;
  btn.addEventListener('click', () => {
    if (key === 'batch') {
      batchMode = !batchMode; btn.classList.toggle('active', batchMode);
    } else {
      activeFilter = key;
      document.querySelectorAll('[data-opt]').forEach(b => {
        if (b.dataset.opt !== 'batch') b.classList.toggle('active', b.dataset.opt === key);
      });
    }
  });
});

document.getElementById('jgTier').querySelectorAll('[data-tier]').forEach(btn => {
  btn.addEventListener('click', () => {
    activeJgTier = btn.dataset.tier;
    document.querySelectorAll('[data-tier]').forEach(b => b.classList.toggle('active', b.dataset.tier === activeJgTier));
  });
});

// ── GENERATE ──────────────────────────────────────────────────────────────

document.getElementById('genBtn').addEventListener('click', () => {
  if (batchMode) {
    const items = Array.from({length: 8}, () => generate(activeCountry, activeFilter, activeJgTier));
    showBatch(items);
  } else {
    const item = generate(activeCountry, activeFilter, activeJgTier);
    showResult(item);
  }
});

document.addEventListener('keydown', e => {
  if ((e.key === 'Enter' || e.key === ' ') && e.target === document.body)
    document.getElementById('genBtn').click();
});

document.getElementById('clearBtn').addEventListener('click', () => {
  history = []; saveHistory(); renderHistory(); showToast('Cleared');
});

// ── INIT ──────────────────────────────────────────────────────────────────

renderCountries();
renderHistory();
</script>
</body>
</html>
